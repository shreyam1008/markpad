<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markpad</title>

  <link rel="stylesheet" href="src/tailwind.css" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.3.0/github-markdown-light.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/lua.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/dart.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/toml.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/dockerfile.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/cmake.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/elixir.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/nim.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/zig.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body class="h-screen w-screen overflow-hidden bg-[#f4f2ed] text-[#1a1c1b] font-sans text-sm antialiased select-none">
  <div id="app" class="flex h-full w-full">

    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-sidebar border-r border-border flex flex-col transition-all duration-200 ease-in-out relative overflow-hidden select-none" style="width: 256px; min-width: 256px;">
      <!-- Sidebar expanded content -->
      <div id="sidebar-expanded-content" class="flex flex-col h-full w-full transition-opacity duration-150 opacity-100">
        <div class="flex items-center justify-between p-3 gap-2 flex-shrink-0">
          <button id="btn-new" class="px-3 py-1.5 rounded-lg bg-accent text-accent-text text-xs font-semibold hover:bg-accent-hover transition-colors" title="New note (Ctrl+N)">+ New</button>
          <button id="btn-collapse" class="icon-btn" title="Collapse sidebar" aria-label="Collapse sidebar"><svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg></button>
        </div>

        <div class="flex-1 overflow-y-auto px-2 pb-2">
          <div id="favorites-section" class="hidden">
            <button data-section-toggle="favorites" class="section-head"><span data-chevron>▾</span><span>Favorites</span></button>
            <div id="favorites-list" data-section-body="favorites" class="space-y-0.5 mb-1"></div>
            <div class="mx-2 border-t border-border-soft"></div>
          </div>

          <div>
            <button data-section-toggle="open" class="section-head"><span data-chevron>▾</span><span>Open</span></button>
            <div id="notes-list" data-section-body="open" class="space-y-0.5 mb-1"></div>
          </div>

          <div id="outline-section" class="hidden">
            <div class="mx-2 border-t border-border-soft"></div>
            <button data-section-toggle="outline" class="section-head"><span data-chevron>▾</span><span>Outline</span></button>
            <div id="outline-list" data-section-body="outline" class="space-y-0.5 mb-1"></div>
          </div>

          <div id="recent-section" class="hidden">
            <div class="mx-2 border-t border-border-soft"></div>
            <button data-section-toggle="recent" class="section-head"><span data-chevron>▾</span><span>Recent</span></button>
            <div id="recent-list" data-section-body="recent" class="space-y-0.5"></div>
          </div>
        </div>
      </div>

      <!-- Sidebar collapsed content -->
      <div id="sidebar-collapsed-content" class="absolute inset-0 flex flex-col items-center py-3 gap-2 transition-opacity duration-150 opacity-0 pointer-events-none">
        <button id="btn-expand" class="icon-btn" title="Expand sidebar" aria-label="Expand sidebar"><svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg></button>
        <button id="btn-new-mini" class="p-1.5 rounded-lg bg-accent text-accent-text text-xs font-bold hover:bg-accent-hover transition-colors w-7 h-7 flex items-center justify-center" title="New note">+</button>
      </div>
    </aside>

    <!-- Main -->
    <main id="main" class="flex-1 flex flex-col overflow-hidden bg-surface">

      <!-- Top bar -->
      <div class="flex items-center justify-between px-4 py-2 border-b border-border-soft gap-3 min-h-[44px]">
        <div class="flex items-center gap-2 min-w-0">
          <span id="note-title" class="font-semibold text-sm truncate max-w-[220px]">Untitled</span>
          <button id="btn-fileinfo" class="w-5 h-5 rounded-full border border-border text-[10px] font-bold text-muted hover:text-accent hover:border-accent transition-colors flex-shrink-0 flex items-center justify-center" title="File info">i</button>
          <span id="dirty-indicator" class="hidden text-[13px] font-bold text-unsaved whitespace-nowrap animate-pulse">NOT SAVED</span>
        </div>
        <div class="flex gap-0.5 bg-hover rounded-lg p-0.5" id="view-mode-group">
          <button data-mode="markdown" class="view-btn" title="Editor only">
            <svg class="w-3.5 h-3.5" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="2" width="14" height="12" rx="2"/><path d="M4 6h8M4 9h5"/></svg>
            <span>Editor</span>
          </button>
          <button data-mode="split" class="view-btn" title="Split view">
            <svg class="w-3.5 h-3.5" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="2" width="14" height="12" rx="2"/><line x1="8" y1="2" x2="8" y2="14"/></svg>
            <span>Split</span>
          </button>
          <button data-mode="viewer" class="view-btn active" title="Preview only">
            <svg class="w-3.5 h-3.5" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 8s3-5 7-5 7 5 7 5-3 5-7 5-7-5-7-5z"/><circle cx="8" cy="8" r="2"/></svg>
            <span>Preview</span>
          </button>
        </div>
        <div class="flex gap-1.5">
          <button id="btn-undo" class="icon-btn" title="Undo (Ctrl+Z)" aria-label="Undo"><svg viewBox="0 0 24 24"><path d="M9 14 4 9l5-5"/><path d="M4 9h10a6 6 0 0 1 6 6v1"/></svg></button>
          <button id="btn-redo" class="icon-btn" title="Redo (Ctrl+Shift+Z)" aria-label="Redo"><svg viewBox="0 0 24 24"><path d="m15 14 5-5-5-5"/><path d="M20 9H10a6 6 0 0 0-6 6v1"/></svg></button>
          <button id="btn-cancel" class="px-3 py-1.5 rounded-lg text-xs font-semibold bg-hover text-muted hover:bg-border transition-colors" title="Revert changes">Cancel</button>
          <button id="btn-save" class="px-3 py-1.5 rounded-lg text-xs font-semibold bg-accent text-accent-text hover:bg-accent-hover transition-colors" title="Save (Ctrl+S)">Save</button>
          <button id="btn-history" class="px-2 py-1.5 rounded-lg text-xs font-semibold bg-hover text-muted hover:bg-border transition-colors" title="Version history (Ctrl+H)">
            <svg class="w-3.5 h-3.5" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 4.5V8l2.5 2"/></svg>
          </button>
        </div>
      </div>


      <!-- Formatting toolbar -->
      <div id="toolbar" class="flex items-center gap-0.5 px-3 py-1 border-b border-border-soft bg-surface overflow-x-auto">
        <button data-action="bold" title="Bold (Ctrl+B)" class="tb"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M4 2h4.5a3 3 0 011.93 5.3A3.5 3.5 0 019 14H4V2zm2 5h2.5a1 1 0 000-2H6v2zm0 2v3h3a1.5 1.5 0 000-3H6z"/></svg></button>
        <button data-action="italic" title="Italic (Ctrl+I)" class="tb"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M6 2h6v2h-2.2l-2.6 8H9v2H3v-2h2.2l2.6-8H6V2z"/></svg></button>
        <button data-action="strikethrough" title="Strikethrough" class="tb"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M1 8h14v1.5H1V8zm4.3-4.8A3.2 3.2 0 018 2c1.6 0 3 .9 3.3 2.3l-1.5.3C9.5 3.6 8.8 3.2 8 3.2c-.7 0-1.4.3-1.5 1 0 .3.1.5.3.7H5a2.5 2.5 0 01.3-1.7zM8 12.8c.8 0 1.5-.4 1.7-1.1l1.5.3C10.8 13.3 9.5 14 8 14a3.5 3.5 0 01-2.8-1.3h1.6c.3.1.7.1 1.2.1z"/></svg></button>
        <span class="tb-sep"></span>
        <button data-action="h1" title="Heading 1" class="tb txt">H1</button>
        <button data-action="h2" title="Heading 2" class="tb txt">H2</button>
        <button data-action="h3" title="Heading 3" class="tb txt">H3</button>
        <span class="tb-sep"></span>
        <button data-action="code" title="Inline code" class="tb"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M5.9 3.4L1.3 8l4.6 4.6 1.1-1.1L3.5 8 7 4.5 5.9 3.4zm4.2 0L9 4.5 12.5 8 9 11.5l1.1 1.1L14.7 8l-4.6-4.6z"/></svg></button>
        <button data-action="codeblock" title="Code block" class="tb txt">```</button>
        <span class="tb-sep"></span>
        <button data-action="link" title="Link (Ctrl+K)" class="tb"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M6.9 11.1a3.1 3.1 0 010-4.4l.7.7a2 2 0 000 3l1.5 1.5a2 2 0 003 0l1.5-1.5a2 2 0 000-3l-.7-.7.7-.7.7.7a3.1 3.1 0 010 4.4l-1.5 1.5a3.1 3.1 0 01-4.4 0L6.9 11.1zM9.1 4.9a3.1 3.1 0 010 4.4l-.7-.7a2 2 0 000-3L6.9 4.1a2 2 0 00-3 0L2.4 5.6a2 2 0 000 3l.7.7-.7.7-.7-.7a3.1 3.1 0 010-4.4l1.5-1.5a3.1 3.1 0 014.4 0l1.5 1.5z"/></svg></button>
        <button data-action="image" title="Image" class="tb"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 3a1 1 0 00-1 1v8a1 1 0 001 1h12a1 1 0 001-1V4a1 1 0 00-1-1H2zm0 1h12v5.6L11.3 7 8 10.3 5.7 8 2 11.7V4zm3 1.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0z"/></svg></button>
        <span class="tb-sep"></span>
        <button data-action="ul" title="Bullet list" class="tb"><svg viewBox="0 0 16 16" fill="currentColor"><circle cx="2.5" cy="4" r="1.2"/><circle cx="2.5" cy="8" r="1.2"/><circle cx="2.5" cy="12" r="1.2"/><rect x="5" y="3" width="10" height="2" rx=".5"/><rect x="5" y="7" width="10" height="2" rx=".5"/><rect x="5" y="11" width="10" height="2" rx=".5"/></svg></button>
        <button data-action="ol" title="Numbered list" class="tb txt">1.</button>
        <button data-action="task" title="Task list" class="tb"><svg viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="14" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M4 8l3 3 5-6" fill="none" stroke="currentColor" stroke-width="1.8"/></svg></button>
        <span class="tb-sep"></span>
        <button data-action="table" title="Table" class="tb"><svg viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="2" width="14" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="1.3"/><line x1="1" y1="6" x2="15" y2="6" stroke="currentColor" stroke-width="1.3"/><line x1="1" y1="10" x2="15" y2="10" stroke="currentColor" stroke-width="1.3"/><line x1="6" y1="2" x2="6" y2="14" stroke="currentColor" stroke-width="1.3"/></svg></button>
        <button data-action="hr" title="Horizontal rule" class="tb"><svg viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="7" width="14" height="2" rx="1"/></svg></button>
        <button data-action="quote" title="Blockquote" class="tb"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 3h3v4H4v2a2 2 0 002 2v2a4 4 0 01-4-4V3h1zm7 0h3v4h-2v2a2 2 0 002 2v2a4 4 0 01-4-4V3h1z"/></svg></button>
      </div>

      <!-- Find bar -->
      <div id="find-bar" class="hidden flex items-center gap-2 px-3 py-1.5 border-b border-border-soft bg-hover">
        <svg class="w-3.5 h-3.5 text-muted flex-shrink-0" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4.5"/><path d="M10 10l4 4"/></svg>
        <input id="find-input" type="text" placeholder="Find in editor..." class="flex-1 bg-transparent border-none outline-none text-[13px] text-[#1a1c1b] placeholder:text-muted" />
        <span id="find-info" class="text-[11px] text-muted"></span>
        <button id="find-close" class="text-muted hover:text-[#1a1c1b] text-sm px-1">&times;</button>
      </div>

      <div id="content-wrapper" class="flex-1 flex overflow-hidden">
      <!-- Content area: editor, split, or viewer -->
      <div id="content-area" class="flex-1 flex overflow-hidden">
        <div id="editor-container" class="flex-1 overflow-hidden p-3">
          <textarea id="editor"
            class="w-full h-full border-none outline-none resize-none bg-editor text-[#1a1c1b] font-mono text-sm leading-7 p-5 rounded-lg select-text"
            placeholder="Start writing Markdown..."
            spellcheck="false"
            style="tab-size:4;"></textarea>
        </div>

        <div id="resize-divider" class="hidden w-1 cursor-col-resize bg-border hover:bg-accent transition-colors flex-shrink-0" title="Drag to resize"></div>

        <div id="viewer-container" class="hidden flex-1 overflow-y-auto p-3">
          <div id="viewer" class="markdown-body bg-editor rounded-lg p-6 min-h-full text-[1.07rem] leading-7 select-text"></div>
        </div>
      </div>

      </div><!-- end content-wrapper -->

      <!-- Status bar -->
      <div class="flex justify-between items-center px-4 py-1 text-[11px] text-muted border-t border-border-soft min-h-[26px]">
        <span id="status-text">Ready</span>
        <span id="status-stats"></span>
      </div>
    </main>

    <!-- History panel (right sidebar) -->
    <aside id="history-panel" class="hidden w-72 min-w-[288px] bg-sidebar border-l border-border flex-col">
      <div class="flex items-center justify-between p-3 border-b border-border">
        <div class="flex items-center gap-1.5">
          <svg class="w-4 h-4 text-accent" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 4.5V8l2.5 2"/></svg>
          <span class="text-xs font-bold uppercase tracking-widest text-muted">History</span>
        </div>
        <button id="history-close" class="text-muted hover:text-[#1a1c1b] text-lg leading-none px-1">&times;</button>
      </div>
      <div id="history-actions" class="hidden px-3 py-2 border-b border-border-soft flex gap-1.5">
        <button id="history-restore" class="flex-1 px-2 py-1.5 rounded-lg text-[11px] font-semibold bg-accent text-accent-text hover:bg-accent-hover transition-colors">Restore this version</button>
        <button id="history-back" class="flex-1 px-2 py-1.5 rounded-lg text-[11px] font-semibold bg-hover text-muted hover:bg-border transition-colors">Back to current</button>
      </div>
      <div id="history-list" class="flex-1 overflow-y-auto px-2 py-2 space-y-1"></div>
      <div id="history-empty" class="hidden flex-1 flex items-center justify-center text-muted text-xs p-4 text-center">No history yet.<br/>Versions are saved when you save the file.</div>
    </aside>
  </div>

  <!-- Context menu -->
  <div id="ctx-menu" class="hidden fixed z-50 bg-surface border border-border rounded-xl shadow-lg py-1 min-w-[180px] text-[13px]">
    <button data-ctx="star" class="ctx-item">Star</button>
    <button data-ctx="info" class="ctx-item">File Info</button>
    <button data-ctx="folder" class="ctx-item">Open Folder</button>
    <button data-ctx="copypath" class="ctx-item">Copy Path</button>
    <div class="mx-2 my-0.5 border-t border-border-soft"></div>
    <button data-ctx="close" class="ctx-item">Close</button>
    <button data-ctx="delete" class="ctx-item text-danger">Delete</button>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="hidden fixed inset-0 bg-black/20 flex items-center justify-center z-50">
    <div class="bg-surface border border-border rounded-2xl w-full max-w-md shadow-xl overflow-hidden mx-6">
      <div class="flex justify-between items-center px-5 pt-4 pb-3 border-b border-border-soft">
        <h2 id="modal-title" class="text-base font-bold">Help</h2>
        <button id="modal-close" class="text-muted hover:text-[#1a1c1b] text-xl leading-none px-1">&times;</button>
      </div>
      <div id="modal-body" class="px-5 py-4 text-[13px] leading-6 text-[#3d403e] max-h-[50vh] overflow-y-auto"></div>
    </div>
  </div>

  <div id="close-overlay" class="hidden fixed inset-0 bg-black/25 flex items-center justify-center z-[60]">
    <div class="confirm-card" role="dialog" aria-modal="true" aria-labelledby="close-title">
      <div class="confirm-icon"><svg viewBox="0 0 24 24"><path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.3 3.5 2.7 17a2 2 0 0 0 1.7 3h15.2a2 2 0 0 0 1.7-3L13.7 3.5a2 2 0 0 0-3.4 0Z"/></svg></div>
      <div>
        <h2 id="close-title">Save changes?</h2>
        <p id="close-message">This file has unsaved changes.</p>
      </div>
      <div class="confirm-actions">
        <button data-close-choice="cancel" class="confirm-btn">Cancel</button>
        <button data-close-choice="discard" class="confirm-btn danger">Don't Save</button>
        <button data-close-choice="save" class="confirm-btn primary">Save</button>
      </div>
    </div>
  </div>

  <script src="src/main.js" type="module"></script>
</body>
</html>
