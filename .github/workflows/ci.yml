name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Test
        run: go test -tags webkit2_41 ./...
      - name: Build
        run: go build -tags "production,webkit2_41" -trimpath -ldflags="-s -w" -o dist/markpad .
