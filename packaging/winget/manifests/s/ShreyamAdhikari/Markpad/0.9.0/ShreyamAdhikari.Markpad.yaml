ShortDescription: Tiny native Markdown notepad and local file viewer
Description: |-
  Markpad is a tiny native Markdown notepad and local file viewer built with
  Go and the system webview. No Electron, under 10 MB, fast startup.

  Features: split view editor/preview, version history, session restore,
  formatting toolbar, find in editor, auto-list continuation, favorites,
  drag-and-drop, file type icons, word count, reading time, and full
  keyboard shortcuts. Opens Markdown, plain text, JSON, YAML, Python, Go,
  JS, HTML, CSS, PDFs, and images.
